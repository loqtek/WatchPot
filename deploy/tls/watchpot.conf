# watchPot compose TLS — nginx terminates HTTPS and proxies to web + api (HTTP upstream).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream watchpot_web {
    server web:3020;
    keepalive 16;
}

upstream watchpot_api {
    server api:6040;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name localhost watchpot.local;

    # Agent enrollment bootstrap (public CA + install script over HTTP — no TLS trust needed yet).
    location = /api/public/agent/ca.crt {
        alias /etc/nginx/tls/ca.crt;
        default_type application/x-pem-file;
        add_header Cache-Control "public, max-age=300";
    }
    location = /api/public/agent/install.sh {
        proxy_pass http://watchpot_api/api/public/agent/install.sh;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto http;
        add_header Cache-Control "public, max-age=300";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name localhost watchpot.local;

    ssl_certificate     /etc/nginx/tls/server.crt;
    ssl_certificate_key /etc/nginx/tls/server.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:watchpot_ssl:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 512m;

    # Public CA for remote agent trust bootstrap (also available over HTTP on port 80).
    location = /api/public/agent/ca.crt {
        alias /etc/nginx/tls/ca.crt;
        default_type application/x-pem-file;
        add_header Cache-Control "public, max-age=300";
    }

    # --- API (FastAPI) ---
    location /api/ {
        proxy_pass http://watchpot_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }

    location = /health {
        proxy_pass http://watchpot_api/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /metrics {
        proxy_pass http://watchpot_api/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /docs {
        proxy_pass http://watchpot_api/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /redoc {
        proxy_pass http://watchpot_api/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /openapi.json {
        proxy_pass http://watchpot_api/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # --- Next.js UI ---
    location / {
        proxy_pass http://watchpot_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
