# Standalone MySQL 8 for local/lab setup (watchPot setup wizard).
# Host port 3307 to avoid clashing with a local MySQL.

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_USER: watchpot
      MYSQL_PASSWORD: watchpot
      MYSQL_DATABASE: watchpot
      MYSQL_ROOT_PASSWORD: watchpot_root_setup_only
    ports:
      - "3307:3306"
    volumes:
      - watchpot_setup_mysql:/var/lib/mysql
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

volumes:
  watchpot_setup_mysql:
