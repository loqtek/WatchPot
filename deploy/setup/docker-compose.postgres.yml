# Standalone Postgres for local/lab setup (watchPot setup wizard).
# Listens on host port 5433 to avoid clashing with a local PostgreSQL on 5432.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: watchpot
      POSTGRES_PASSWORD: watchpot
      POSTGRES_DB: watchpot
    ports:
      - "5433:5432"
    volumes:
      - watchpot_setup_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchpot -d watchpot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  watchpot_setup_pg:
